{% extends "base.html" %}

{% block title %}Employee Check - Metroline{% endblock %}

{% block content %}
<div class="employee-check-page">
    <div class="employee-check-card">
        <h1>Employee Verification</h1>
        <p>Enter your employee number to access your personal log card.</p>

        <form method="POST">
            <label>Employee Number</label>
            <input type="text" name="employee_no" placeholder="Example: 417692" required>

            <button type="submit">Access Log Card</button>
        </form>
    </div>
</div>
{% endblock %}
